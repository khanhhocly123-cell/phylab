<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 120" width="230" height="120" role="img" aria-label="Đồng hồ MC964 mặt trước">
  <defs><linearGradient id="cream-f" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FCF8EF"/><stop offset="100%" stop-color="#F3EEDF"/></linearGradient></defs>
  <rect x="3" y="50" width="9" height="22" rx="2" fill="#B8B8BE"/>
  <rect x="218" y="50" width="9" height="22" rx="2" fill="#B8B8BE"/>
  <rect x="12" y="8" width="206" height="100" rx="6" fill="url(#cream-f)" stroke="#888780" stroke-width="1"/>
  <rect x="19" y="14" width="192" height="88" rx="4" fill="none" stroke="#b3ac98" stroke-width="0.7"/>
  <!-- LED -->
  <rect x="28" y="26" width="78" height="36" rx="3" fill="#3A1414" stroke="#61252C" stroke-width="2"/>
  <text id="led" x="67" y="51" text-anchor="middle" font-family="monospace" font-size="21" fill="#FF2D2D" letter-spacing="3">00:00</text>
  <text x="30" y="80" font-family="Nunito,sans-serif" font-size="14" font-style="italic" font-weight="700" fill="#C0392B">Phylab</text>
  <!-- núm MODE -->
  <g id="num-mode">
    <circle cx="138" cy="46" r="15" fill="#C9C1C1" stroke="#9B9B9B" stroke-width="1"/>
    <line x1="138" y1="46" x2="128" y2="38" stroke="#1F4D78" stroke-width="2.2" stroke-linecap="round"/>
    <g font-family="Nunito,sans-serif" font-size="7" fill="#333">
      <text x="115" y="50">A</text><text x="117" y="33">B</text>
      <text x="129" y="24">A+B</text><text x="153" y="34">A↔B</text><text x="156" y="51">T</text>
    </g>
  </g>
  <!-- RESET -->
  <g id="nut-reset">
    <text x="184" y="28" text-anchor="middle" font-family="Nunito,sans-serif" font-size="8" fill="#444" font-weight="700">Reset</text>
    <circle cx="184" cy="42" r="8" fill="#E03A36" stroke="#9A2E2E" stroke-width="1"/>
  </g>
  <!-- THANG ĐO -->
  <g id="thang-do" font-family="Nunito,sans-serif">
    <text x="165" y="74" font-size="7" fill="#333">0.01</text>
    <text x="186" y="74" font-size="7" fill="#333">0.001</text>
    <rect x="165" y="78" width="34" height="10" rx="5" fill="#B8B8BE" stroke="#999" stroke-width="0.5"/>
    <circle cx="193" cy="83" r="4" fill="#fff" stroke="#888" stroke-width="0.6"/>
    <text x="182" y="98" text-anchor="middle" font-size="7" fill="#444">Thang đo</text>
  </g>
