<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 50" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="50" rx="8" fill="#FBF6EC" stroke="rgba(213, 106, 23, 0.2)" stroke-width="1.25" />

  <style>
    @keyframes wave {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -100; }
    }
    .wave-line {
      stroke-dasharray: 10, 15;
      animation: wave 5s linear infinite;
    }
    .footer-text {
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
      font-size: 9px;
      font-weight: 800;
      fill: #3E2718;
      opacity: 0.5;
      letter-spacing: 3px;
    }
  </style>

  <!-- Animated Wave Line -->
  <path d="M 10,25 C 200,5 300,45 500,25 C 600,15 700,35 790,25" fill="none" stroke="#D56A17" stroke-width="1.5" opacity="0.4" class="wave-line" />

  <!-- Center text -->
  <text x="400" y="29" text-anchor="middle" class="footer-text">PHYLAB — CREATED FOR THE FUTURE OF EDUCATION</text>
</svg>
